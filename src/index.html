<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanotec CANopen Control</title>
  <link href="StyleSheet.css" rel="stylesheet">
  <!-- Apply saved theme before render to avoid flash -->
  <script>
    (function () {
      var theme = localStorage.getItem('gs-theme') || 'dark';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
</head>
<body>
  <!-- Top navigation bar -->
  <div class="topnav" id="topnav">
    <span style="padding:14px 20px; font-size:20px; font-weight:bold;">
      Nanotec CANopen Control
    </span>
    <button id="theme-toggle-btn" onclick="toggleTheme()" title="Toggle dark/light mode">☾</button>
  </div>

  <!-- Left sidebar -->
  <div class="sidenav" id="sidenav">
    <h1>Motor Control</h1>

    <!-- Connection toggle -->
    <div class="toggle-container" title="Connect to the controller">
      <label class="toggle-label" for="connection-toggle">Connection</label>
      <label class="toggle-container">
        <input type="checkbox" id="connection-toggle" class="toggle-input">
        <span class="toggle-slider"></span>
      </label>
    </div><br>

    <!-- Motor toggle -->
    <div class="toggle-container" title="Enable / disable motors">
      <label class="toggle-label" for="motor-toggle">Motors On</label>
      <label class="toggle-container">
        <input type="checkbox" id="motor-toggle" class="toggle-input" disabled>
        <span class="toggle-slider"></span>
      </label>
    </div><br>

    <!-- Live position table -->
    <div class="target-control">
      <table class="parameter-table">
        <thead>
          <tr>
            <th class="param-header">Parameter</th>
            <th class="axis-header">Ax 1</th>
            <th class="axis-header">Ax 2</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="param-label">Position</td>
            <td class="param-input-cell">
              <input type="text" id="pos1" value="---" class="param-input" readonly>
            </td>
            <td class="param-input-cell">
              <input type="text" id="pos2" value="---" class="param-input" readonly>
            </td>
          </tr>
        </tbody>
      </table>
    </div><br>

    <!-- Status -->
    <div class="target-control" title="Connection status">
      <label>Status</label>
      <div id="status" style="font-size:12px; color:var(--color-text-muted); text-align:center;">
        Disconnected
      </div>
    </div>

    <br><hr><br>

    <!-- Navigation -->
    <div>
      <a href="#" class="button active" id="movement-control-button"
         title="Movement control interface" onclick="MovementControl(); return false;">
        Movement Control
      </a>
    </div>
  </div>

  <!-- Main content area -->
  <div id="main-content" style="margin-left:370px; margin-top:60px; padding:20px;">
    <h2>Log</h2>
    <pre id="log"></pre>
  </div>

  <script src="nanotec-canopen.js"></script>
  <script src="panelUI.js"></script>
  <script src="app.js"></script>
</body>
</html>
